name: Update Experience Years

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute years of experience since 2022-04-01
        id: exp
        run: |
          START_EPOCH=$(date -d "2022-04-01" +%s)
          NOW_EPOCH=$(date +%s)
          YEARS=$(( (NOW_EPOCH - START_EPOCH) / 31557600 ))
          echo "years=$YEARS" >> "$GITHUB_OUTPUT"

      - name: Update README.md
        run: |
          sed -i -E "s#(<!--EXPERIENCE_YEARS-->).*(<!--END_EXPERIENCE_YEARS-->)#\1mais de ${{ steps.exp.outputs.years }} anos\2#" README.md

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update experience years"
          git push
